<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/asciinema-player@3.15.1/dist/bundle/asciinema-player.css" />
<style>
  body {
    margin: 0;
    padding: 0;
    background: #282a36;
  }
  #player {
    width: 1200px;
    height: 800px;
  }
  /* Hide controls */
  .ap-control-bar { display: none !important; }
  .ap-start-button { display: none !important; }
</style>
</head>
<body>
<div id="player"></div>
<script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.15.1/dist/bundle/asciinema-player.min.js"></script>
<script>
  const player = AsciinemaPlayer.create(
    'demo.cast',
    document.getElementById('player'),
    {
      autoPlay: true,
      speed: 2,
      theme: 'dracula',
      fontFamily: "'JetBrainsMono Nerd Font', 'Iosevka Nerd Font Mono', monospace",
      fontSize: "14px",
      fit: "width",
      idleTimeLimit: 5
    }
  );
</script>
</body>
</html>
